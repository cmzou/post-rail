<!doctype html>
<html>
<style>
    .css-rainbow-text {
        background: linear-gradient(90deg, #f00, #ff2b00, #f50, #ff8000, #fa0, #ffd500, #ff0, #d4ff00, #af0, #80ff00, #5f0, #2bff00, #0f0, #00ff2b, #0f5, #00ff80, #0fa, #00ffd5, #0ff, #00d4ff, #0af, #007fff, #05f, #002bff, #00f, #2a00ff, #50f, #7f00ff, #a0f, #d400ff, #f0f, #ff00d4, #f0a, #ff0080, #f05, #ff002b, #f00);
        -webkit-text-fill-color: transparent;
        -webkit-background-clip: text;
        background-clip: text;
        font-size: 50px;
        font-weight: bold;
        display: block;
        animation: css-rainbow-text 10s linear infinite;
    }

    @keyframes css-rainbow-text {
        0% {
            transform: translateX(0vw);
        }

        100% {
            transform: translateX(100vw);
        }
    }

    section {
        display: inline-flex;
        flex-direction: row;
        flex-wrap: wrap;
    }

    article {
        padding: 10px;
        margin: 10px;
        border: 2px solid maroon;
    }
</style>

<head>
    <title>File browser for {{ IMAGE_DIR }}</title>
</head>

<body>
    <h1>Files in {{ IMAGE_DIR }}</h1>

    <div class="css-rainbow-text">{{ marquee_text }}</div>

    <button type="button" onclick="pressButton()">Restart Application</button>
    <p id="message"></p>

    <p></p>

    <section>

        <article>
            <h2>Upload images</h2>

            Size limit: 1 GB

            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button type="submit">Upload</button>
            </form>

            <ul>
                {% for file in files %}
                <li>
                    {{ file }}
                    <img src="/images/{{ file }}" width="200">

                    <a href="/download/{{ file }}">download</a>

                    <form action="/delete/{{ file }}" method="post" style="display:inline;">
                        <button type="submit">delete</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
        </article>
        <article>
            <h2>Edit config file</h2>

            {{ CONFIG_FILE }}:

            <p>The application must be restarted for changes to take effect.</p>

            <form method="post" action="/save-config">
                <textarea name="content" style="width: 500px; height: 400px; font-family: monospace;">{{ config_content }}</textarea>
                <br><br>
                <button type="submit">Save</button>
            </form>
        </article>
        <!-- <article>
            <h2>Search for bus stop data</h2>

            Edit route_to_ids from data_parsers.py and restart application for changes to take effect.


        </article> -->
    </section>

    <script>
        function pressButton() {
            fetch('/restart', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    document.getElementById('message').textContent = data.message;
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>

</html>
